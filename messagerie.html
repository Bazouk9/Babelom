<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Babelom — Messagerie</title>
<script src="supabase-config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --terre:#1e3a28; --brun:#2e5a38; --ocre:#d4880a;
  --sable:#c8d8b0; --parchemin:#e8e4d0; --creme:#f5f2e8;
  --muted:#7a9a72; --ardoise:#4a7a52;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Jost',sans-serif;background:var(--creme);color:var(--terre);display:flex;flex-direction:column;}

/* NAV */
nav{background:#1e3a28;display:flex;align-items:center;justify-content:space-between;padding:14px 52px;flex-shrink:0;z-index:100;}
.nav-links{display:flex;align-items:center;gap:32px;list-style:none;}
.nav-links a{font-size:.82rem;text-transform:uppercase;letter-spacing:.14em;color:#c8dab0;text-decoration:none;display:flex;align-items:baseline;gap:6px;transition:color .2s;}
.nav-links a:hover,.nav-links a.active{color:white;}
.nav-links a .nav-num{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700;color:#d4880a;}
.nav-links a.active .nav-num{color:#e8a030;}

/* LAYOUT */
.app{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:300px;flex-shrink:0;background:var(--parchemin);border-right:2px solid var(--sable);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-header{padding:18px 18px 12px;border-bottom:1px solid var(--sable);display:flex;align-items:center;justify-content:space-between;}
.sidebar-title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:600;color:var(--terre);text-transform:uppercase;letter-spacing:.08em;}
.btn-plus{background:var(--ocre);color:white;border:none;width:28px;height:28px;border-radius:50%;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,transform .15s;}
.btn-plus:hover{background:#b87008;transform:scale(1.1);}
.search-wrap{padding:10px 14px;border-bottom:1px solid var(--sable);}
.search-wrap input{width:100%;background:white;border:1.5px solid var(--sable);color:var(--terre);font-family:'Jost',sans-serif;font-size:.82rem;padding:7px 12px;outline:none;border-radius:20px;transition:border-color .2s;}
.search-wrap input:focus{border-color:var(--ocre);}
.conv-list{flex:1;overflow-y:auto;}
.conv-item{padding:12px 16px;border-bottom:1px solid rgba(200,216,176,.35);cursor:pointer;transition:background .15s;display:flex;gap:11px;align-items:flex-start;}
.conv-item:hover{background:rgba(245,242,232,.7);}
.conv-item.active{background:var(--creme);border-left:3px solid var(--ocre);}
.conv-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:.95rem;font-weight:700;color:white;flex-shrink:0;}
.conv-body{flex:1;min-width:0;}
.conv-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px;}
.conv-nom{font-size:.87rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.conv-heure{font-size:.68rem;color:var(--muted);flex-shrink:0;margin-left:4px;}
.conv-apercu{font-size:.77rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.badge{background:var(--ocre);color:white;font-size:.62rem;font-weight:700;border-radius:10px;padding:1px 6px;}

/* CHAT */
.chat-zone{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--muted);text-align:center;padding:40px;}
.empty-state .ico{font-size:2.8rem;opacity:.35;}
.empty-state h3{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:400;color:var(--terre);}
.empty-state p{font-size:.85rem;line-height:1.7;max-width:260px;}

/* HEADER CHAT */
.chat-header{padding:13px 22px;border-bottom:1px solid var(--sable);background:white;display:flex;align-items:center;gap:13px;flex-shrink:0;}
.ch-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:700;color:white;}
.ch-info{flex:1;}
.ch-nom{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:400;}
.ch-sub{font-size:.73rem;color:var(--muted);font-style:italic;}
.ch-btn{background:none;border:1.5px solid var(--sable);color:var(--muted);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.ch-btn:hover{border-color:var(--ocre);color:var(--ocre);}

/* MESSAGES */
.msgs{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth;}
.date-sep{text-align:center;font-size:.7rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);display:flex;align-items:center;gap:10px;margin:2px 0;}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--sable);}
.msg-row{display:flex;gap:8px;align-items:flex-end;animation:pop .22s ease forwards;}
.msg-row.moi{flex-direction:row-reverse;}
@keyframes pop{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.msg-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:.82rem;font-weight:700;color:white;flex-shrink:0;}
.msg-content{display:flex;flex-direction:column;max-width:60%;}
.msg-row.moi .msg-content{align-items:flex-end;}
.bubble{padding:9px 15px;border-radius:16px 16px 16px 4px;font-size:.88rem;line-height:1.6;word-break:break-word;background:white;border:1.5px solid var(--sable);color:var(--terre);}
.msg-row.moi .bubble{background:var(--terre);color:var(--creme);border-color:var(--terre);border-radius:16px 16px 4px 16px;}
.msg-meta{font-size:.67rem;color:var(--muted);margin-top:2px;padding:0 3px;}
.msg-row.moi .msg-meta{text-align:right;}

/* TYPING */
.typing{display:flex;align-items:center;gap:9px;opacity:0;transition:opacity .3s;padding:2px 0;}
.typing.show{opacity:1;}
.typing-dots{display:flex;gap:4px;background:white;border:1.5px solid var(--sable);padding:9px 13px;border-radius:16px 16px 16px 4px;}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:dot 1.2s infinite;}
.typing-dots span:nth-child(2){animation-delay:.2s;}
.typing-dots span:nth-child(3){animation-delay:.4s;}
@keyframes dot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}

/* SAISIE */
.saisie{padding:12px 18px;border-top:1px solid var(--sable);background:white;display:flex;gap:8px;align-items:flex-end;flex-shrink:0;}
.saisie-ico{background:none;border:none;color:var(--muted);font-size:1rem;cursor:pointer;padding:7px;border-radius:50%;transition:color .2s,background .2s;}
.saisie-ico:hover{color:var(--ocre);background:var(--parchemin);}
.saisie textarea{flex:1;background:var(--creme);border:1.5px solid var(--sable);color:var(--terre);font-family:'Jost',sans-serif;font-size:.88rem;padding:9px 15px;outline:none;border-radius:20px;resize:none;min-height:40px;max-height:110px;line-height:1.5;transition:border-color .2s;}
.saisie textarea:focus{border-color:var(--ocre);background:white;}
.btn-send{background:var(--ocre);color:white;border:none;width:38px;height:38px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0;transition:background .2s,transform .15s;}
.btn-send:hover{background:#b87008;transform:scale(1.05);}
.btn-send:active{transform:scale(.94);}

/* MODALE */
.overlay{display:none;position:fixed;inset:0;background:rgba(30,58,40,.72);z-index:500;align-items:center;justify-content:center;}
.overlay.on{display:flex;}
.modal{background:var(--creme);padding:38px 34px;max-width:400px;width:90%;animation:fadeUp .28s ease;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:400;color:var(--terre);margin-bottom:6px;}
.modal-title em{color:var(--ocre);font-style:italic;}
.modal-sub{font-size:.84rem;color:var(--muted);margin-bottom:20px;line-height:1.6;}
.modal label{display:block;font-size:.73rem;text-transform:uppercase;letter-spacing:.13em;color:var(--muted);margin-bottom:6px;}
.modal input{width:100%;background:white;border:1.5px solid var(--sable);color:var(--terre);font-family:'Jost',sans-serif;font-size:.88rem;padding:10px 13px;outline:none;border-radius:2px;margin-bottom:14px;transition:border-color .2s;}
.modal input:focus{border-color:var(--ocre);}
.modal-foot{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:14px;border-top:1px solid var(--sable);}
.btn-cancel{background:none;border:none;color:var(--muted);font-family:'Jost',sans-serif;font-size:.82rem;cursor:pointer;}
.btn-go{background:var(--terre);color:var(--creme);border:none;padding:10px 22px;font-family:'Jost',sans-serif;font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:background .2s;}
.btn-go:hover{background:var(--brun);}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* SCROLLBAR */
.conv-list::-webkit-scrollbar,.msgs::-webkit-scrollbar{width:3px;}
.conv-list::-webkit-scrollbar-thumb,.msgs::-webkit-scrollbar-thumb{background:var(--sable);}

/* FOOTER */
footer{background: #1e3a28;color:#c8d8b0;padding:9px 52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.footer-text{font-size:.78rem;}
</style>

// ── GARDE D'ACCÈS ──

  }

<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Messages</span>
      <button class="btn-plus" onclick="openModal()" title="Nouvelle conversation">+</button>
    </div>
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Rechercher…" oninput="renderSidebar(this.value)">
    </div>
    <div class="conv-list" id="conv-list"></div>
  </div>

  <!-- ZONE CHAT -->
  <div class="chat-zone">
    <!-- Écran vide -->
    <div class="empty-state" id="empty">
      <div class="ico">💬</div>
      <h3>Vos échanges</h3>
      <p>Sélectionnez une conversation ou démarrez-en une nouvelle avec le bouton +</p>
    </div>

    <!-- Chat actif -->
    <div id="chat" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
      <div class="chat-header">
        <div class="ch-av" id="h-av"></div>
        <div class="ch-info">
          <div class="ch-nom" id="h-nom"></div>
          <div class="ch-sub" id="h-sub"></div>
        </div>
        <button class="ch-btn" title="Archiver" onclick="archiver()">📁</button>
      </div>
      <div class="msgs" id="msgs"></div>
      <div class="typing" id="typing">
        <div class="msg-av" id="t-av"></div>
        <div class="typing-dots"><span></span><span></span><span></span></div>
      </div>
      <div class="saisie">
        <button class="saisie-ico" onclick="emoji()" title="Emoji">😊</button>
        <button class="saisie-ico" onclick="alert('Envoi de fichier à venir')" title="Joindre">📎</button>
        <textarea id="txt" rows="1" placeholder="Écrivez un message…"
          onkeydown="onKey(event)" oninput="resize(this)"></textarea>
        <button class="btn-send" onclick="send()">➤</button>
      </div>
    </div>
  </div>
</div>

<!-- MODALE -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title">Nouveau <em>message</em></div>
    <p class="modal-sub">Écrivez à quelqu'un qui partage un souvenir sur Babelom.</p>

    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>

<script>
const COLORS = ['#4a7a52','#d4880a','#2e5a38','#7a5a3a','#3a6a8a','#8a3a5a'];
const REPLIES = [
  'Oui, je m\'en souviens très bien… c\'était une autre époque.',
  'Merci pour ce partage, cela me touche vraiment.',
  'Avez-vous des photos de cette période ?',
  'C\'est exactement pour ça que j\'ai rejoint Babelom.',
  'Ma famille se posait la même question ! Incroyable.',
  'Ces coïncidences de mémoire sont bouleversantes.',
  'Je transmettrai cela à mes enfants.',
  'Quel lieu extraordinaire pour grandir…',
];

let convs = [
  { id:1, nom:'Fatima R.', lieu:'Tlemcen, Algérie', ini:'F', col:'#4a7a52', unread:2, msgs:[
    {moi:false,txt:'Bonjour, j\'ai vu votre souvenir sur la carte — vous avez habité rue des Orangers à Tlemcen ?',h:'Hier 14:22'},
    {moi:true, txt:'Oui ! De 1958 à 1962. Ma mère y est née. Vous connaissiez ce quartier ?',h:'Hier 15:04'},
    {moi:false,txt:'Ma grand-mère habitait juste à côté. Elle parlait souvent d\'une famille avec trois enfants — c\'était peut-être la vôtre ?',h:'Hier 15:41'},
    {moi:true, txt:'C\'est tout à fait possible ! Ma mère avait deux frères. Je vais lui demander.',h:'Aujourd\'hui 09:15'},
    {moi:false,txt:'Ce serait extraordinaire. Ces retrouvailles de mémoire, c\'est exactement ce pour quoi Babelom existe.',h:'Aujourd\'hui 09:52'},
    {moi:false,txt:'Avez-vous des photos de cette époque ?',h:'Aujourd\'hui 10:03'},
  ]},
  { id:2, nom:'Pierre-André M.', lieu:'Lublin, Pologne', ini:'P', col:'#d4880a', unread:0, msgs:[
    {moi:false,txt:'Bonjour, vos parents habitaient bien au 14 rue Krakowskie Przedmieście ?',h:'Lundi 11:30'},
    {moi:true, txt:'Oui, de 1965 à 1972 ! Vous avez vécu dans le même immeuble ?',h:'Lundi 14:12'},
    {moi:false,txt:'Mes grands-parents y étaient de 1960 à 1978. Quel monde !',h:'Lundi 14:45'},
  ]},
  { id:3, nom:'Sorel K.', lieu:'Paris 11e, France', ini:'S', col:'#2e5a38', unread:0, msgs:[
    {moi:false,txt:'Bonjour, je mène une recherche sur le quartier de la Roquette dans les années 80. Votre témoignage est précieux.',h:'12 jan. 16:00'},
    {moi:true, txt:'Je suis ravie de pouvoir contribuer. Que souhaitez-vous savoir exactement ?',h:'13 jan. 09:20'},
  ]},
  { id:4, nom:'Équipe Babelom', lieu:'Babelom', ini:'B', col:'#7a5a3a', unread:0, msgs:[
    {moi:false,txt:'Bienvenue dans l\'archive Babelom ! Votre souvenir a bien été enregistré. Merci de contribuer à cette mémoire collective.',h:'8 jan. 10:00'},
  ]},
];

let active = null;

function now() {
  const d = new Date();
  return `Aujourd'hui ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function renderSidebar(f='') {
  const el = document.getElementById('conv-list');
  el.innerHTML = '';
  convs.filter(c => !f || c.nom.toLowerCase().includes(f.toLowerCase()) || c.lieu.toLowerCase().includes(f.toLowerCase()))
    .forEach(c => {
      const last = c.msgs[c.msgs.length-1];
      const d = document.createElement('div');
      d.className = 'conv-item' + (active===c.id?' active':'');
      d.innerHTML = `
        <div class="conv-av" style="background:${c.col}">${c.ini}</div>
        <div class="conv-body">
          <div class="conv-top">
            <span class="conv-nom">${c.nom}</span>
            ${c.unread ? `<span class="badge">${c.unread}</span>` : `<span class="conv-heure">${last?.h?.split(' ')[0]||''}</span>`}
          </div>
          <div class="conv-apercu">${last?(last.moi?'Vous : ':'')+last.txt:'Nouvelle conversation'}</div>
        </div>`;
      d.onclick = () => openConv(c.id);
      el.appendChild(d);
    });
}

function openConv(id) {
  active = id;
  const c = convs.find(x=>x.id===id);
  if (!c) return;
  c.unread = 0;

  document.getElementById('empty').style.display = 'none';
  const chat = document.getElementById('chat');
  chat.style.display = 'flex';

  const av = document.getElementById('h-av');
  av.textContent = c.ini; av.style.background = c.col;
  document.getElementById('h-nom').textContent = c.nom;
  document.getElementById('h-sub').textContent = c.lieu;

  const tav = document.getElementById('t-av');
  tav.textContent = c.ini; tav.style.background = c.col;

  renderMsgs(c);
  renderSidebar(document.getElementById('search').value);
  document.getElementById('txt').focus();
}

function renderMsgs(c) {
  const el = document.getElementById('msgs');
  el.innerHTML = '';
  let lastD = '';
  c.msgs.forEach(m => {
    const d = m.h.includes('Hier') ? 'Hier' : m.h.includes('Aujourd') ? "Aujourd'hui" : m.h.split(' ')[0];
    if (d !== lastD) {
      lastD = d;
      const sep = document.createElement('div');
      sep.className = 'date-sep'; sep.textContent = d;
      el.appendChild(sep);
    }
    const row = document.createElement('div');
    row.className = 'msg-row' + (m.moi?' moi':'');
    row.innerHTML = `
      <div class="msg-av" style="background:${m.moi?'#1e3a28':c.col}">${m.moi?'M':c.ini}</div>
      <div class="msg-content">
        <div class="bubble">${m.txt}</div>
        <div class="msg-meta">${m.h}${m.moi?' · ✓':''}</div>
      </div>`;
    el.appendChild(row);
  });
  el.scrollTop = el.scrollHeight;
}

function send() {
  const ta = document.getElementById('txt');
  const txt = ta.value.trim();
  if (!txt || active===null) return;
  const c = convs.find(x=>x.id===active);
  c.msgs.push({moi:true,txt,h:now()});
  renderMsgs(c);
  renderSidebar(document.getElementById('search').value);
  ta.value = ''; ta.style.height = 'auto';
  simulateReply(c);
}

function simulateReply(c) {
  const t = document.getElementById('typing');
  t.classList.add('show');
  document.getElementById('msgs').appendChild(t);
  document.getElementById('msgs').scrollTop = 99999;
  setTimeout(() => {
    if (active!==c.id){t.classList.remove('show');return;}
    t.classList.remove('show');
    c.msgs.push({moi:false,txt:REPLIES[Math.floor(Math.random()*REPLIES.length)],h:now()});
    renderMsgs(c);
    renderSidebar(document.getElementById('search').value);
  }, 1400 + Math.random()*1200);
}

function onKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }
function resize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,110)+'px'; }
function emoji(){
  const list=['😊','🙏','❤️','🏠','✨','👋','🌍','📍'];
  const t=document.getElementById('txt');
  t.value+=list[Math.floor(Math.random()*list.length)]; t.focus();
}

function archiver(){
  if(!active) return;
  convs=convs.filter(c=>c.id!==active); active=null;
  document.getElementById('empty').style.display='flex';
  document.getElementById('chat').style.display='none';
  renderSidebar();
}

function openModal(){ document.getElementById('overlay').classList.add('on'); document.getElementById('m-dest').focus(); }
function closeModal(){ document.getElementById('overlay').classList.remove('on'); document.getElementById('m-dest').value=''; document.getElementById('m-msg').value=''; }
function startConv(){
  const dest=document.getElementById('m-dest').value.trim();
  const msg=document.getElementById('m-msg').value.trim();
  if(!dest){document.getElementById('m-dest').focus();return;}
  const id=Date.now();
  convs.unshift({id,nom:dest,lieu:'Babelom',ini:dest[0].toUpperCase(),col:COLORS[convs.length%COLORS.length],unread:0,
    msgs:msg?[{moi:true,txt:msg,h:now()}]:[]});
  closeModal(); renderSidebar(); openConv(id);
}
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

renderSidebar();
openConv(1);
</script>
</body>
</html>
